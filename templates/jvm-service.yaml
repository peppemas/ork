kernel:
  image: linuxkit/kernel:6.12.59
  cmdline: "console=tty0 console=ttyS0"

init:
  - linuxkit/init:b5506cc74a6812dc40982cacfd2f4328f8a4b12a
  - linuxkit/runc:9442aa234715e751a16144f1d4ae3fd1a00fd492
  - linuxkit/containerd:ba19f64efd3331a8fd0a33e00eabd14f6ee1780e
  - linuxkit/ca-certificates:256f1950df59f2f209e9f0b81374177409eb11de

onboot:
  - name: network
    image: alpine:3.22
    net: host
    capabilities:
      - CAP_NET_ADMIN
    command:
      - /bin/sh
      - -c
      - |
        set -eux
        ip link set eth0 up
        ip addr add 10.0.2.15/24 dev eth0 2>/dev/null || true
        ip route add default via 10.0.2.2 2>/dev/null || true

services:
  - name: sshd
    image: alpine:3.22
    net: host
    capabilities:
      - CAP_SYS_ADMIN
      - CAP_NET_BIND_SERVICE
      - CAP_SETUID
      - CAP_SETGID
    runtime:
      mkdir:
        - /var/lib/workspace
      mounts:
        - type: ext4
          source: /dev/vda
          destination: /var/lib/workspace
          options:
            - rw
    binds:
      - /var/lib/workspace:/workspace
    command:
      - /bin/sh
      - -c
      - |
        set -eux
        printf "nameserver 10.0.2.3\nnameserver 8.8.8.8\n" > /etc/resolv.conf
        apk add --no-cache dropbear openjdk21-jre-headless
        mkdir -p /etc/dropbear /root/.ssh
        dropbearkey -t rsa -f /etc/dropbear/dropbear_rsa_host_key
        dropbearkey -t ecdsa -f /etc/dropbear/dropbear_ecdsa_host_key
        cp /workspace/.ork/authorized_keys /root/.ssh/authorized_keys
        chmod 700 /root/.ssh
        chmod 600 /root/.ssh/authorized_keys
        exec dropbear -F -E -s -p 22
